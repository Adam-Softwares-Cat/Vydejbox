<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Výdejní box</title>
<style>
body {
    font-family: Arial;
    text-align: center;
}
.display {
    font-size: 40px;
    margin: 20px;
    height: 50px;
}
.grid {
    display: grid;
    grid-template-columns: repeat(3, 100px);
    gap: 10px;
    justify-content: center;
}
button {
    font-size: 30px;
    padding: 20px;
}
</style>
</head>

<h1>Výdejní box</h1>

<div class="display" id="display"></div>

<div class="grid">
    <button onclick="add(1)">1</button>
    <button onclick="add(2)">2</button>
    <button onclick="add(3)">3</button>
    <button onclick="add(4)">4</button>
    <button onclick="add(5)">5</button>
    <button onclick="add(6)">6</button>
    <button onclick="add(7)">7</button>
    <button onclick="add(8)">8</button>
    <button onclick="add(9)">9</button>
    <button onclick="clearAll()">C</button>
    <button onclick="add(0)">0</button>
    <button onclick="del()">←</button>
</div>

<br>
<button onclick="confirmCode()">Potvrdit</button>

<h2 id="result"></h2>

<script>

    function flash(color){
    document.body.style.background = color;
    setTimeout(() => {
        document.body.style.background = "white";
    }, 500);
}

    function playSound(src){
    let sound = new Audio(src);
    sound.play().catch(()=>{});
}

function confirmCode(){
    let data = JSON.parse(localStorage.getItem("boxes") || "[]");
    let found = data.find(b => b.code === code);
if(found){
    flash("lightgreen");
} else {
    flash("red");
}
    
    if(found){
        document.getElementById("result").innerText =
            "Balík: " + found.name + " | Box: " + found.box;

        playSound("https://www.soundjay.com/buttons/sounds/button-3.mp3");

        setTimeout(() => {
            document.getElementById("result").innerText = "";
        }, 10000);
    } else {
        document.getElementById("result").innerText = "Neplatný kód";

        playSound("https://www.soundjay.com/buttons/sounds/button-10.mp3");
    }

    code = "";
    update();
}

    let unlocked = false;

document.body.addEventListener("click", () => {
    if(!unlocked){
        document.getElementById("okSound").play().then(()=> {
            document.getElementById("okSound").pause();
            document.getElementById("okSound").currentTime = 0;
        });
        unlocked = true;
    }
});
    
let code = "";

function add(num){
    if(code.length < 10){
        code += num;
        update();
    }
}

function update(){
    document.getElementById("display").innerText = code;
}

function clearAll(){
    code = "";
    update();
}

function del(){
    code = code.slice(0, -1);
    update();
}

function confirmCode(){

    let ip = localStorage.getItem("serverIp");

    if(ip){
        fetch("http://" + ip + ":3000/log", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                code: code,
                time: new Date().toISOString()
            })
        }).catch(()=>{});
    }

    let data = JSON.parse(localStorage.getItem("boxes") || "[]");
    let found = data.find(b => b.code === code);

    if(found){
        document.getElementById("result").innerText =
            "Balík: " + found.name + " | Box: " + found.box;
    } else {
        document.getElementById("result").innerText = "Neplatný kód";
    }

    code = "";
    update();
}
</script>

</body>
</html>
